<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">opc — Idea-stage CLI for AI-native one-person companies</title>
  <desc id="desc">A dark gradient GitHub README hero banner showing the opc command line workflow from raw idea to validated decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B16"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#24114B"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(910 92) rotate(128) scale(430 250)">
      <stop stop-color="#8B5CF6" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 365) rotate(-25) scale(390 210)">
      <stop stop-color="#14B8A6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="106" y1="315" x2="1034" y2="315" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="430" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="32" fill="url(#glowA)"/>
  <rect width="1200" height="430" rx="32" fill="url(#glowB)"/>

  <g opacity="0.17">
    <path d="M48 77H1152" stroke="#E5E7EB"/>
    <path d="M48 143H1152" stroke="#E5E7EB"/>
    <path d="M48 209H1152" stroke="#E5E7EB"/>
    <path d="M48 275H1152" stroke="#E5E7EB"/>
    <path d="M48 341H1152" stroke="#E5E7EB"/>
    <path d="M164 36V394" stroke="#E5E7EB"/>
    <path d="M384 36V394" stroke="#E5E7EB"/>
    <path d="M604 36V394" stroke="#E5E7EB"/>
    <path d="M824 36V394" stroke="#E5E7EB"/>
    <path d="M1044 36V394" stroke="#E5E7EB"/>
  </g>

  <g transform="translate(72 56)">
    <rect x="0" y="0" width="96" height="42" rx="14" fill="#0F172A" stroke="#334155"/>
    <text x="48" y="28" text-anchor="middle" class="mono" font-size="22" font-weight="800" fill="#67E8F9">opc</text>

    <text x="0" y="98" class="sans" font-size="54" font-weight="850" fill="#F8FAFC" letter-spacing="-1.4">Kill weak ideas before</text>
    <text x="0" y="157" class="sans" font-size="54" font-weight="850" fill="#F8FAFC" letter-spacing="-1.4">they kill your runway.</text>

    <text x="2" y="206" class="sans" font-size="22" fill="#CBD5E1">A local-first CLI that turns rough startup ideas into</text>
    <text x="2" y="236" class="sans" font-size="22" fill="#CBD5E1">testable hypotheses, adversarial critiques, interviews, and go/no-go decisions.</text>

    <g transform="translate(0 280)">
      <rect width="305" height="52" rx="16" fill="#020617" fill-opacity="0.74" stroke="#334155"/>
      <text x="22" y="34" class="mono" font-size="18" fill="#F8FAFC">$ opc idea kill</text>
      <circle cx="268" cy="26" r="6" fill="#22D3EE"/>
      <circle cx="286" cy="26" r="6" fill="#A78BFA"/>
    </g>
  </g>

  <g filter="url(#shadow)" transform="translate(700 76)">
    <rect width="410" height="260" rx="24" fill="#020617" fill-opacity="0.86" stroke="#475569"/>
    <rect x="0" y="0" width="410" height="46" rx="24" fill="#111827"/>
    <circle cx="28" cy="23" r="6" fill="#F87171"/>
    <circle cx="50" cy="23" r="6" fill="#FBBF24"/>
    <circle cx="72" cy="23" r="6" fill="#34D399"/>

    <text x="28" y="86" class="mono" font-size="16" fill="#94A3B8">rough idea</text>
    <path d="M138 80H274" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <path d="M264 70L278 80L264 90" stroke="#F472B6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="292" y="86" class="mono" font-size="16" fill="#F8FAFC">decision</text>

    <g transform="translate(30 116)">
      <rect width="150" height="42" rx="12" fill="#0F172A" stroke="#1E293B"/>
      <text x="18" y="27" class="mono" font-size="14" fill="#67E8F9">brief</text>
      <text x="76" y="27" class="mono" font-size="14" fill="#CBD5E1">hypothesis</text>
    </g>
    <g transform="translate(210 116)">
      <rect width="150" height="42" rx="12" fill="#0F172A" stroke="#1E293B"/>
      <text x="18" y="27" class="mono" font-size="14" fill="#FCA5A5">kill</text>
      <text x="66" y="27" class="mono" font-size="14" fill="#CBD5E1">risks</text>
    </g>
    <g transform="translate(30 176)">
      <rect width="150" height="42" rx="12" fill="#0F172A" stroke="#1E293B"/>
      <text x="18" y="27" class="mono" font-size="14" fill="#C4B5FD">interview</text>
      <text x="104" y="27" class="mono" font-size="14" fill="#CBD5E1">prep</text>
    </g>
    <g transform="translate(210 176)">
      <rect width="150" height="42" rx="12" fill="#0F172A" stroke="#1E293B"/>
      <text x="18" y="27" class="mono" font-size="14" fill="#86EFAC">exit</text>
      <text x="66" y="27" class="mono" font-size="14" fill="#CBD5E1">check</text>
    </g>
  </g>
</svg>
